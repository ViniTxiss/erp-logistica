<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-50/50 antialiased selection:bg-indigo-500/30">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Formuca ERP{% endblock %}</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        // Paleta premium (tons de Indigo/Violet como marca principal)
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b',
                        },
                        slate: {
                            850: '#151e2e',
                        }
                    },
                    boxShadow: {
                        // Sombras suaves estilo "Apple/Vercel"
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 20px rgba(99, 102, 241, 0.15)',
                    }
                }
            }
        }
    </script>

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.8/dist/cdn.min.js"></script>

    <style>
        /* Ajustes HTMX */
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
        
        /* Utilitário Alpine */
        [x-cloak] { display: none !important; }
        
        /* Scrollbar customizada e elegante */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="h-full flex overflow-hidden text-slate-800 text-sm" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    <!-- Decorative Background Elements (Mesh Gradient feel) -->
    <div class="absolute top-0 -left-40 w-96 h-96 bg-brand-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>
    <div class="absolute top-40 right-0 w-96 h-96 bg-violet-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>

    <!-- Sidebar -->
    {% include 'components/sidebar.html' %}

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 z-10 relative">
        <!-- Topbar -->
        {% include 'components/topbar.html' %}

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8" id="main-content">
            <div class="max-w-7xl mx-auto">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <!-- Modals Portal Area -->
    <div id="modal-portal"></div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
