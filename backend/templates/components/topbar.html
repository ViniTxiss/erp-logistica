<header class="h-20 bg-white/60 backdrop-blur-xl border-b border-slate-200/60 flex items-center justify-between px-8 flex-shrink-0 z-20 sticky top-0">
    <!-- Left side: Breadcrumb / Title & Toggle Button -->
    <div class="flex items-center gap-3">
        <!-- Hamburger Menu Button (Mobile/Tablet only) -->
        <button @click="sidebarOpen = !sidebarOpen" 
                class="p-2 -ml-2 rounded-xl text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-all duration-200 lg:hidden focus:outline-none focus:ring-2 focus:ring-brand-500" 
                aria-label="Abrir menu">
            <i class="ti ti-menu-2 text-2xl"></i>
        </button>
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">
                {% block page_title %}Recebimento de mercadorias{% endblock %}
            </h1>
            <p class="text-sm font-medium text-slate-500 mt-0.5 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-brand-500"></span>
                {% block page_subtitle %}WMS — Armazém Central{% endblock %}
            </p>
        </div>
    </div>

    <!-- Right side: Actions -->
    <div class="flex items-center gap-4">
        {% block topbar_actions %}
        <!-- Exemplo de botão padrão, substituído nas views filhas -->
        <button class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-slate-900 rounded-xl hover:bg-slate-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 shadow-soft hover:-translate-y-0.5">
            <i class="ti ti-plus text-lg"></i>
            Nova entrada
        </button>
        {% endblock %}
    </div>
</header>
