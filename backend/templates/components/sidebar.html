<aside class="w-64 flex-shrink-0 bg-white/60 backdrop-blur-xl border-r border-slate-200/60 flex flex-col transition-all duration-300 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20">
    <!-- Logo -->
    <div class="h-20 flex items-center px-6 border-b border-slate-200/60">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-violet-600 flex items-center justify-center shadow-glow mr-3">
            <i class="ti ti-package text-white text-lg"></i>
        </div>
        <span class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700">Formuca</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-8">
        
        <!-- WMS Section -->
        <div>
            <div class="px-2 mb-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Armazém</div>
            <div class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-white shadow-sm border border-slate-200/50 text-brand-600 font-medium transition-all duration-200 hover:shadow-soft">
                    <i class="ti ti-arrow-down-circle text-xl"></i>
                    Recebimento
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-white/80 hover:text-slate-900 hover:shadow-sm hover:border hover:border-slate-200/50 transition-all duration-200 border border-transparent">
                    <i class="ti ti-arrow-up-circle text-xl"></i>
                    Expedição
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-white/80 hover:text-slate-900 hover:shadow-sm hover:border hover:border-slate-200/50 transition-all duration-200 border border-transparent">
                    <i class="ti ti-layout-grid text-xl"></i>
                    Posições
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-white/80 hover:text-slate-900 hover:shadow-sm hover:border hover:border-slate-200/50 transition-all duration-200 border border-transparent">
                    <i class="ti ti-chart-bar text-xl"></i>
                    Inventário
                </a>
            </div>
        </div>

        <!-- TMS Section -->
        <div>
            <div class="px-2 mb-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Transporte</div>
            <div class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-white/80 hover:text-slate-900 hover:shadow-sm hover:border hover:border-slate-200/50 transition-all duration-200 border border-transparent">
                    <i class="ti ti-file-text text-xl"></i>
                    Romaneios
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-white/80 hover:text-slate-900 hover:shadow-sm hover:border hover:border-slate-200/50 transition-all duration-200 border border-transparent">
                    <i class="ti ti-truck text-xl"></i>
                    Transportadoras
                </a>
            </div>
        </div>

        <!-- CRM Section -->
        <div>
            <div class="px-2 mb-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Clientes</div>
            <div class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-white/80 hover:text-slate-900 hover:shadow-sm hover:border hover:border-slate-200/50 transition-all duration-200 border border-transparent">
                    <i class="ti ti-users text-xl"></i>
                    Clientes
                </a>
            </div>
        </div>

    </nav>

    <!-- User Profile (Bottom) -->
    <div class="p-4 border-t border-slate-200/60 bg-white/40">
        <div class="flex items-center gap-3 cursor-pointer hover:bg-white p-2.5 rounded-xl transition-all duration-200 border border-transparent hover:border-slate-200/50 hover:shadow-sm">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 border border-indigo-200 flex items-center justify-center text-brand-700 font-bold text-sm shadow-inner">
                {{ request.user.nome_completo|default:"U"|slice:":1" }}
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-slate-900 truncate">{{ request.user.nome_completo|default:"Usuário" }}</p>
                <p class="text-[11px] text-slate-500 truncate font-medium">{{ request.user.email|default:"operador" }}</p>
            </div>
            <i class="ti ti-selector text-slate-400"></i>
        </div>
    </div>
</aside>
