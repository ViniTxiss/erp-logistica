{% extends 'base.html' %}

{% block title %}TMS - Motoristas{% endblock %}

{% block content %}
<div class="mb-8" x-data="{ openForm: false }">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Motoristas</h1>
            <p class="text-slate-500 mt-1">Gerencie a frota de motoristas da empresa.</p>
        </div>
        <button @click="openForm = !openForm" class="mt-4 sm:mt-0 bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 px-4 rounded-xl shadow-soft hover:shadow-glow transition-all duration-300 flex items-center gap-2">
            <i class="ti ti-plus"></i>
            <span x-text="openForm ? 'Cancelar Cadastro' : 'Novo Motorista'"></span>
        </button>
    </div>

    <!-- Inline Form -->
    <div x-show="openForm" x-collapse x-cloak class="mb-8 bg-white p-6 rounded-2xl shadow-soft border border-slate-100 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-brand-50 rounded-full filter blur-[80px] opacity-60 -z-10 pointer-events-none"></div>
        <h2 class="text-lg font-semibold text-slate-800 mb-4 border-b border-slate-100 pb-2">Cadastrar Novo Motorista</h2>
        <form hx-post="{% url 'tms_ui:motorista_criar' %}" hx-target="#tabela-motoristas" @submit="setTimeout(() => openForm = false, 100)" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% csrf_token %}
            <div>
                <label for="nome" class="block text-sm font-medium text-slate-700 mb-1">Nome Completo</label>
                <input type="text" name="nome" id="nome" required class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-4 py-2.5 transition-all outline-none border" placeholder="Ex: João da Silva">
            </div>
            <div>
                <label for="cpf" class="block text-sm font-medium text-slate-700 mb-1">CPF</label>
                <input type="text" name="cpf" id="cpf" required class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-4 py-2.5 transition-all outline-none border" placeholder="Ex: 000.000.000-00">
            </div>
            <div>
                <label for="telefone" class="block text-sm font-medium text-slate-700 mb-1">Telefone</label>
                <input type="text" name="telefone" id="telefone" class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-4 py-2.5 transition-all outline-none border" placeholder="(00) 00000-0000">
            </div>
            <div>
                <label for="cnh" class="block text-sm font-medium text-slate-700 mb-1">CNH</label>
                <input type="text" name="cnh" id="cnh" required class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-4 py-2.5 transition-all outline-none border" placeholder="Nº da CNH">
            </div>
            <div>
                <label for="categoria_cnh" class="block text-sm font-medium text-slate-700 mb-1">Categoria CNH</label>
                <select name="categoria_cnh" id="categoria_cnh" required class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-4 py-2.5 transition-all outline-none border bg-white">
                    <option value="B" selected>B</option>
                    <option value="A">A</option>
                    <option value="AB">AB</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                </select>
            </div>
            <div>
                <label for="validade_cnh" class="block text-sm font-medium text-slate-700 mb-1">Validade CNH</label>
                <input type="date" name="validade_cnh" id="validade_cnh" required class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-4 py-2.5 transition-all outline-none border">
            </div>
            <div class="md:col-span-3 flex justify-end">
                <button type="submit" class="bg-brand-900 hover:bg-slate-850 text-white font-medium py-2.5 px-6 rounded-xl shadow-soft transition-all duration-300 flex items-center gap-2">
                    <i class="ti ti-device-floppy"></i>
                    Salvar Motorista
                </button>
            </div>
        </form>
    </div>

    <!-- Filters & Table -->
    <div class="bg-white rounded-2xl shadow-soft border border-slate-100 overflow-hidden relative">
        <!-- Decorator -->
        <div class="absolute -top-40 -left-40 w-80 h-80 bg-violet-50 rounded-full filter blur-[100px] opacity-70 pointer-events-none"></div>

        <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4 z-10 relative bg-white/50 backdrop-blur-sm">
            <div class="relative max-w-sm w-full">
                <i class="ti ti-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                <input type="text" name="q" placeholder="Buscar por nome..."
                    class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all text-sm outline-none"
                    hx-get="{% url 'tms_ui:motoristas_list' %}"
                    hx-trigger="keyup changed delay:500ms"
                    hx-target="#tabela-motoristas">
            </div>
        </div>

        <div id="tabela-motoristas" class="relative z-10">
            {% include 'tms/partials/tabela_motoristas.html' %}
        </div>
    </div>
</div>
{% endblock %}
