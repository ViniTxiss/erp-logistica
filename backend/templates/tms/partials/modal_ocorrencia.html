<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
    
    <!-- Backdrop overlay -->
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" 
         @click="showOcorrenciaModal = false"></div>

    <!-- Modal Content (Glassmorphism & Soft Shadow) -->
    <div class="relative w-full max-w-lg bg-white/95 backdrop-blur-xl border border-slate-200/80 rounded-2xl p-6 sm:p-8 shadow-2xl transition-all z-10 transform scale-100 hover:scale-[1.005]">
        
        <!-- Header -->
        <div class="flex items-center justify-between pb-4 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-rose-50 flex items-center justify-center text-rose-600">
                    <i class="ti ti-alert-triangle text-xl"></i>
                </div>
                <div>
                    <h3 class="text-base font-bold text-slate-900">Registrar Ocorrência</h3>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Romaneio: ROM-{{ romaneio.numero }}</p>
                </div>
            </div>
            <button @click="showOcorrenciaModal = false" class="p-1.5 rounded-lg text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-colors focus:outline-none">
                <i class="ti ti-x text-lg"></i>
            </button>
        </div>

        <!-- Form -->
        <form hx-post="{% url 'tms_ui:ocorrencia_registrar' romaneio.id %}" 
              class="space-y-4 mt-6">
            
            <!-- Item Relacionado -->
            <div>
                <label for="item_id" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Vincular a uma entrega específica</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="ti ti-map-pin text-base"></i>
                    </div>
                    <select name="item_id" 
                            id="item_id" 
                            class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl text-xs text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium appearance-none">
                        <option value="">Romaneio Inteiro (Geral)</option>
                        {% for item in itens %}
                        <option value="{{ item.id }}">Parada {{ forloop.counter }} — {{ item.destinatario }} ({{ item.cidade }}/{{ item.uf }})</option>
                        {% endfor %}
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                        <i class="ti ti-selector text-base"></i>
                    </div>
                </div>
            </div>

            <!-- Tipo de Ocorrência -->
            <div>
                <label for="tipo" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Tipo de Ocorrência <span class="text-rose-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="ti ti-tag text-base"></i>
                    </div>
                    <select name="tipo" 
                            id="tipo" 
                            required
                            class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl text-xs text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium appearance-none">
                        <option value="avaria">Avaria / Dano na mercadoria</option>
                        <option value="atraso">Atraso em trânsito</option>
                        <option value="tentativa">Tentativa de entrega sem sucesso</option>
                        <option value="roubo">Roubo / Furto</option>
                        <option value="acidente">Acidente com veículo</option>
                        <option value="recusa">Recusa do destinatário no ato</option>
                        <option value="outro">Outro evento impeditivo</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                        <i class="ti ti-selector text-base"></i>
                    </div>
                </div>
            </div>

            <!-- Descrição / Detalhes -->
            <div>
                <label for="descricao" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Descrição Detalhada <span class="text-rose-500">*</span></label>
                <textarea name="descricao" 
                          id="descricao" 
                          rows="4" 
                          required
                          placeholder="Descreva o que houve com detalhes. Ex: Destinatário não estava no local, retornaremos no dia seguinte..." 
                          class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium"></textarea>
            </div>

            <!-- Action buttons -->
            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 mt-6">
                <button type="button" 
                        @click="showOcorrenciaModal = false" 
                        class="px-4 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-50 border border-slate-200/60 hover:text-slate-700 transition-all focus:outline-none">
                    Cancelar
                </button>
                <button type="submit" 
                        class="inline-flex items-center gap-2 px-5 py-2 text-xs font-bold text-white bg-rose-600 rounded-xl hover:bg-rose-500 transition-all focus:outline-none shadow-soft hover:-translate-y-0.5">
                    <i class="ti ti-alert-triangle text-sm"></i>
                    Registrar Evento
                </button>
            </div>
        </form>
    </div>
</div>
