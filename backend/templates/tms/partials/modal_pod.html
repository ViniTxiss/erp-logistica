<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" 
     x-data="{ 
         lat: '', 
         lng: '',
         obterLocalizacao() {
             if (navigator.geolocation) {
                 navigator.geolocation.getCurrentPosition(
                     (position) => {
                         this.lat = position.coords.latitude;
                         this.lng = position.coords.longitude;
                     },
                     (error) => {
                         console.warn('Erro ao obter geolocalização:', error.message);
                     },
                     { timeout: 5000 }
                 );
             }
         }
     }" 
     x-init="obterLocalizacao()">
     
    <!-- Backdrop overlay -->
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" 
         @click="showPODModal = false"></div>

    <!-- Modal Content (Glassmorphism & Soft Shadow) -->
    <div class="relative w-full max-w-lg bg-white/95 backdrop-blur-xl border border-slate-200/80 rounded-2xl p-6 sm:p-8 shadow-2xl transition-all z-10 transform scale-100 hover:scale-[1.005]">
        
        <!-- Header -->
        <div class="flex items-center justify-between pb-4 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-brand-50 flex items-center justify-center text-brand-600">
                    <i class="ti ti-signature text-xl"></i>
                </div>
                <div>
                    <h3 class="text-base font-bold text-slate-900">Registrar Entrega (POD)</h3>
                    <p class="text-xs text-slate-500 font-medium mt-0.5">Destinatário: {{ item.destinatario }}</p>
                </div>
            </div>
            <button @click="showPODModal = false" class="p-1.5 rounded-lg text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-colors focus:outline-none">
                <i class="ti ti-x text-lg"></i>
            </button>
        </div>

        <!-- Form -->
        <form hx-post="{% url 'tms_ui:item_confirmar_entrega' item.id %}" 
              hx-target="#itens-entrega-container"
              class="space-y-4 mt-6">
            
            <!-- Hidden inputs for coordinates -->
            <input type="hidden" name="latitude" x-model="lat">
            <input type="hidden" name="longitude" x-model="lng">

            <!-- Assinatura / Nome do recebedor -->
            <div>
                <label for="assinado_por" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Nome do Recebedor <span class="text-rose-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="ti ti-user text-base"></i>
                    </div>
                    <input type="text" 
                           name="assinado_por" 
                           id="assinado_por" 
                           required 
                           placeholder="Quem recebeu a mercadoria?" 
                           class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium">
                </div>
            </div>

            <!-- Observações -->
            <div>
                <label for="observacao" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Observações Adicionais</label>
                <textarea name="observacao" 
                          id="observacao" 
                          rows="3" 
                          placeholder="Ex: Entregue na portaria, recebido sem avarias..." 
                          class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium"></textarea>
            </div>

            <!-- GPS Status -->
            <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-50 border border-slate-100 text-[10px] font-semibold text-slate-500">
                <span class="w-2 h-2 rounded-full" :class="lat ? 'bg-emerald-500' : 'bg-amber-400 animate-pulse'"></span>
                <span x-text="lat ? 'Coordenadas GPS capturadas com sucesso' : 'Obtendo coordenadas de geolocalização...'"></span>
            </div>

            <!-- Action buttons -->
            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 mt-6">
                <button type="button" 
                        @click="showPODModal = false" 
                        class="px-4 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-50 border border-slate-200/60 hover:text-slate-700 transition-all focus:outline-none">
                    Cancelar
                </button>
                <button type="submit" 
                        class="inline-flex items-center gap-2 px-5 py-2 text-xs font-bold text-white bg-brand-600 rounded-xl hover:bg-brand-500 transition-all focus:outline-none shadow-soft hover:-translate-y-0.5">
                    <i class="ti ti-check text-sm"></i>
                    Confirmar Entrega
                </button>
            </div>
        </form>
    </div>
</div>
