
<style>
#erd svg { width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  Empresa ||--o{ Filial : "tem"
  Empresa ||--o{ Usuario : "pertence"
  Filial  ||--o{ Usuario : "lotado em"
  Filial  ||--|| Endereco : "localizada em"
  Usuario ||--o{ PerfilUsuario : "possui"
  Perfil  ||--o{ PerfilUsuario : "atribuído via"
  Perfil  ||--o{ PerfilPermissao : "tem"
  Permissao ||--o{ PerfilPermissao : "concedida via"
  Usuario ||--o{ AuditLog : "gera"

  Empresa {
    uuid id PK
    string razao_social
    string cnpj UK
    string inscricao_estadual
    string email_principal
    boolean ativo
    datetime created_at
  }

  Filial {
    uuid id PK
    uuid empresa_id FK
    uuid endereco_id FK
    string nome
    string cnpj UK
    string codigo_interno
    boolean matriz
    boolean ativa
  }

  Endereco {
    uuid id PK
    string cep
    string logradouro
    string numero
    string complemento
    string bairro
    string cidade
    string uf
    float latitude
    float longitude
  }

  Usuario {
    uuid id PK
    uuid empresa_id FK
    uuid filial_id FK
    string nome_completo
    string email UK
    string telefone
    string cargo
    boolean ativo
    datetime ultimo_login
    datetime created_at
  }

  Perfil {
    uuid id PK
    uuid empresa_id FK
    string nome
    string descricao
    boolean sistema
  }

  Permissao {
    uuid id PK
    string codigo UK
    string modulo
    string acao
    string descricao
  }

  PerfilUsuario {
    uuid id PK
    uuid usuario_id FK
    uuid perfil_id FK
    datetime valido_ate
  }

  PerfilPermissao {
    uuid id PK
    uuid perfil_id FK
    uuid permissao_id FK
  }

  AuditLog {
    uuid id PK
    uuid usuario_id FK
    string modulo
    string acao
    string objeto_tipo
    uuid objeto_id
    json payload_antes
    json payload_depois
    string ip
    datetime created_at
  }
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
