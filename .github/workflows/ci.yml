# Formuca ERP — CI/CD com GitHub Actions
#
# Executa em todo push e PR para main/develop:
#   1. Lint (flake8)
#   2. Testes (pytest) com SQLite em memória
#   3. Cobertura de código (coverage report)
#
# Não precisa de PostgreSQL nem Redis — usa SQLite :memory: e Celery eager.

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "erp logistica/backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "erp logistica/backend/**"

defaults:
  run:
    working-directory: "erp logistica/backend"

jobs:
  test:
    name: Lint + Testes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "erp logistica/backend/requirements/development.txt"

      # ── Dependências ────────────────────────────────────────────────────────
      - name: Instalar dependências
        run: pip install -r requirements/development.txt

      # ── .env mínimo para CI (sem DB real) ───────────────────────────────────
      - name: Criar .env de CI
        run: |
          cat > .env << 'EOF'
          SECRET_KEY=ci-secret-key-nao-usar-em-producao
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DATABASE_URL=sqlite:///db-ci.sqlite3
          CELERY_BROKER_URL=memory://
          REDIS_URL=redis://localhost:6379/0
          ACCESS_TOKEN_LIFETIME_MINUTES=60
          REFRESH_TOKEN_LIFETIME_DAYS=7
          CORS_ALLOWED_ORIGINS=
          EOF

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint com flake8
        run: |
          pip install flake8
          # Erros críticos: sintaxe e imports não usados
          flake8 apps/ config/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          # Avisos gerais (não bloqueiam o CI)
          flake8 apps/ config/ \
            --count \
            --exit-zero \
            --max-line-length=110 \
            --statistics

      # ── Django check ────────────────────────────────────────────────────────
      - name: Django system check
        run: python manage.py check --settings=config.settings.test

      # ── Testes + Cobertura ──────────────────────────────────────────────────
      - name: Testes com pytest e cobertura
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      # ── Upload cobertura para Codecov (opcional) ─────────────────────────────
      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: "erp logistica/backend/coverage.xml"
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
